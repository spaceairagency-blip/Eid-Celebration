<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="s4fu7VY947YdFAtnkEHCvX2C7i5OTLOVCVsAXQ-GuXQ" />
    <title>Eid Mubarak | Personal Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --deep-blue: #090a0f; --success: #2ecc71; }
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            background: var(--deep-blue);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -2;
        }
        #stars-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .controls { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .control-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; border-radius: 50%; cursor: pointer; backdrop-filter: blur(5px);
            width: 40px; height: 40px; display: grid; place-items: center;
        }
        .main-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100dvh; 
            padding: 40px 20px;
            gap: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: clamp(20px, 5vw, 40px);
            border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 100%; max-width: 400px; text-align: center;
        }
        h1 {
            font-family: 'Bungee', cursive; font-size: clamp(1.4rem, 8vw, 2.2rem);
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
        .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        @media (min-width: 400px) { .countdown-grid { grid-template-columns: repeat(4, 1fr); } }
        .time-box { background: rgba(0, 0, 0, 0.5); padding: 15px 5px; border-radius: 15px; border-bottom: 3px solid var(--gold); }
        .num { display: block; font-family: 'Bungee'; font-size: 1.5rem; color: var(--gold); }
        .label { font-size: 0.6rem; opacity: 0.7; }
        .salami-wrapper {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { background: rgba(241, 196, 15, 0.15); color: var(--gold); font-family: 'Bungee'; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .symbol { color: var(--gold); font-weight: 900; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        .mega-btn {
            background: linear-gradient(135deg, var(--gold), #f39c12); color: #000;
            border: none; padding: 16px; font-family: 'Bungee'; border-radius: 50px;
            width: 100%; cursor: pointer; transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .mega-btn:active { transform: scale(0.95); }
        .secondary-btn { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .audio-player-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 10px 15px;
            display: none;
            align-items: center;
            gap: 12px;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .audio-btn {
            background: var(--gold); border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; display: grid; place-items: center;
            font-size: 0.8rem; color: black; transition: 0.2s;
        }
        .audio-info { flex-grow: 1; overflow: hidden; }
        .track-name { font-size: 0.7rem; font-family: 'Bungee'; color: var(--gold); display: block; }
        .audio-progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; cursor: pointer; }
        .audio-progress-fill { height: 100%; background: var(--gold); width: 0%; border-radius: 2px; }
        #scene-icon { font-size: 80px; display: block; margin-bottom: 10px; }
        #scene-text { font-family: 'Bungee'; min-height: 4em; display: grid; place-items: center; }
        #progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        #progress-bar { width: 0%; height: 100%; background: var(--gold); }
        #share-canvas { display: none; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <canvas id="stars-canvas"></canvas>
    <canvas id="share-canvas" width="600" height="600"></canvas>

    <div class="controls">
        <button id="fs-btn" class="control-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div id="audio-ui" class="audio-player-container">
        <button id="audio-toggle" class="audio-btn">▶</button>
        <div class="audio-info">
            <span class="track-name">Eid Takbeer</span>
            <div class="audio-progress-bg" id="audio-track-bg">
                <div class="audio-progress-fill" id="audio-track-fill"></div>
            </div>
        </div>
        <audio id="eid-audio">
            <source src="Eid-Takbeer.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="main-wrapper">
        <div id="countdown-ui" class="glass-card">
            <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--gold); margin: 0;">EID AL-FITR 2026</p>
            <h1>EID IS COMING</h1>
            <div class="button-group">
                <button onclick="copyLink(this)" class="mega-btn secondary-btn">Copy Link</button>
            </div>
            <div class="countdown-grid">
                <div class="time-box"><span class="num" id="days">00</span><span class="label">DAYS</span></div>
                <div class="time-box"><span class="num" id="hours">00</span><span class="label">HRS</span></div>
                <div class="time-box"><span class="num" id="mins">00</span><span class="label">MINS</span></div>
                <div class="time-box"><span class="num" id="secs">00</span><span class="label">SECS</span></div>
            </div>
        </div>

        <div id="eid-ui" class="glass-card" style="display: none;">
            <div style="font-size: 60px;">🌙</div>
            <h1>EID MUBARAK</h1>
            <button class="mega-btn" onclick="askNameAndStart()">WATCH EID JOURNEY</button>
        </div>
                
        <div id="story-ui" class="glass-card" style="display: none;">
            <span id="scene-icon">🌙</span>
            <div id="scene-text">PREPARING...</div>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="final-actions" style="display: none;">
                <button class="mega-btn secondary-btn" onclick="shareExperience()">SHARE GIFT CARD 🎁</button>
                <button class="mega-btn" onclick="location.reload()" style="margin-top:10px;">REPLAY JOURNEY 🔄</button>
            </div>
        </div>

        <div class="salami-wrapper">
            <table>
                <thead>
                    <tr><th>Name</th><th>Salami</th><th>Symbol</th></tr>
                </thead>
                <tbody>
                    <tr><td>Lopa Yeasmin</td><td>50 + 50 = 100</td><td class="symbol">৳</td></tr>
                    <tr><td>Tahia Yeasmin</td><td>50 + 50 = 100</td><td class="symbol">৳</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const eidDate = new Date("2026-03-20T18:40:00").getTime(); 
        let userName = "Friend";
        let fireworkTimer = null;

        const audio = document.getElementById('eid-audio');
        const audioBtn = document.getElementById('audio-toggle');
        const audioFill = document.getElementById('audio-track-fill');
        const audioUI = document.getElementById('audio-ui');

        // --- NEW FULLSCREEN FUNCTION ---
        function toggleFullscreen() {
            const btn = document.getElementById('fs-btn');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => btn.innerText = "✖")
                    .catch(err => console.error(err));
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    btn.innerText = "⛶";
                }
            }
        }

        function updateClock() {
            const now = new Date().getTime();
            const distance = eidDate - now;

            if (distance < 0) {
                document.getElementById('countdown-ui').style.display = 'none';
                document.getElementById('eid-ui').style.display = 'block';
                audioUI.style.display = 'flex';
            } else {
                audioUI.style.display = 'none';
                document.getElementById('days').innerText = Math.floor(distance / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((distance % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        audioBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); audioBtn.innerText = "⏸"; }
            else { audio.pause(); audioBtn.innerText = "▶"; }
        });

        audio.addEventListener('timeupdate', () => {
            audioFill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
        });

        function copyLink(btn) {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED! ✅";
                setTimeout(() => btn.innerText = old, 2000);
            });
        }

        function askNameAndStart() {
            const n = prompt("Enter your name:", "Friend");
            if(n) userName = n;
            audio.play(); audioBtn.innerText = "⏸";
            startStory();
        }

        async function startStory() {
            document.getElementById('eid-ui').style.display = 'none';
            document.getElementById('story-ui').style.display = 'block';
            const scenes = [
                { i: "🚶‍♂️🕌", t: `Hey ${userName}, Mosque time!`, d: 2000 },
                { i: "🤝✨", t: "Eid Prayer", d: 2500 },
                { i: "🏠🚶‍♂️", t: "Going home...", d: 1500 },
                { i: "🥣😋", t: "Eid Treats!", d: 2500 },
                { i: "🥳🎉", t: `EID MUBARAK!`, d: 5000, finale: true }
            ];
            const icon = document.getElementById('scene-icon');
            const txt = document.getElementById('scene-text');
            const bar = document.getElementById('progress-bar');

            for (let res of scenes) {
                icon.style.opacity = "0"; await new Promise(r => setTimeout(r, 200));
                icon.innerText = res.i; txt.innerText = res.t; icon.style.opacity = "1";
                bar.style.transition = "none"; bar.style.width = "0%";
                setTimeout(() => { bar.style.transition = `width ${res.d}ms linear`; bar.style.width = "100%"; }, 50);
                if (res.finale) {
                    fireworkTimer = setInterval(() => {
                        confetti({ particleCount: 30, spread: 50, origin: { x: 0.5, y: 0.7 } });
                    }, 450); 
                }
                await new Promise(r => setTimeout(r, res.d));
            }
            document.getElementById('final-actions').style.display = 'block';
        }

        const sCanvas = document.getElementById('stars-canvas');
        const sCtx = sCanvas.getContext('2d');
        let stars = [];
        function init() {
            sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
            stars = Array(50).fill().map(() => ({ x: Math.random()*sCanvas.width, y: Math.random()*sCanvas.height, v: Math.random()*0.5 }));
        }
        function draw() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            sCtx.fillStyle = "white";
            stars.forEach(s => {
                sCtx.beginPath(); sCtx.arc(s.x, s.y, 1, 0, Math.PI*2); sCtx.fill();
                s.y += s.v; if(s.y > sCanvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
